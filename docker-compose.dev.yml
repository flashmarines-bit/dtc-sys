version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: dtc_dev
      POSTGRES_USER: dtc_user
      POSTGRES_PASSWORD: dtc_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dtc_user -d dtc_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: dtc_minio
      MINIO_ROOT_PASSWORD: dtc_minio_secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=dtc_dev;Username=dtc_user;Password=dtc_password
      - Storage__Provider=minio
      - Storage__Minio__Endpoint=minio:9000
      - Storage__Minio__AccessKey=dtc_minio
      - Storage__Minio__SecretKey=dtc_minio_secret
      - Storage__Minio__Bucket=dtc-storage
      - Storage__Minio__UseSSL=false
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy

  ocr:
    build:
      context: .
      dockerfile: Dockerfile.ocr
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres_data:
  minio_data:
